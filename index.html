<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>📚 Exam Mood Detector | Troll Funny Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; 
        }

        body {
            background: linear-gradient(145deg, #1e2a3a 0%, #0f1724 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Comic Neue', 'Fredoka One', system-ui, -apple-system, 'Inter', sans-serif;
            padding: 1.5rem;
        }

        .detector-card {
            max-width: 620px;
            width: 100%;
            background: rgba(255, 248, 225, 0.98);
            border-radius: 68px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.4), 0 8px 18px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,255,0.6);
            overflow: hidden;
            transition: all 0.2s ease;
            backdrop-filter: blur(0px);
        }

        .troll-header {
            background: #ffb347;
            background: linear-gradient(135deg, #ff9a3c, #ff6f3c);
            padding: 1.5rem 2rem;
            text-align: center;
            border-bottom: 5px solid #ffdd99;
        }

        .troll-header h1 {
            font-size: 2.3rem;
            letter-spacing: -0.5px;
            color: #2d1b00;
            text-shadow: 3px 3px 0 #ffdd99;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .troll-header p {
            font-weight: bold;
            background: #2c1a0c;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 60px;
            color: #ffe2b5;
            font-size: 0.85rem;
            margin-top: 12px;
        }

        /* main content */
        .content {
            padding: 2rem 2rem 2rem 2rem;
        }

        .input-group {
            margin-bottom: 1.7rem;
        }

        label {
            font-weight: 800;
            font-size: 1rem;
            color: #3b2a1f;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        label i {
            font-size: 1.2rem;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 2px solid #ffcf9a;
            background: #fffef7;
            border-radius: 48px;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
            font-weight: 500;
            color: #2f241b;
        }

        input:focus, select:focus {
            border-color: #ff8833;
            box-shadow: 0 0 0 3px rgba(255, 136, 51, 0.3);
            background: white;
        }

        .troll-btn {
            background: #2ecc71;
            background: linear-gradient(95deg, #f39c12, #e67e22);
            border: none;
            width: 100%;
            padding: 16px 12px;
            font-size: 1.6rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            text-shadow: 1px 1px 0 #a04000;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 0 #b45f1b;
            transform: translateY(-2px);
            margin-top: 10px;
        }

        .troll-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #b45f1b;
        }

        .result-area {
            margin-top: 32px;
            background: #2f2e2b;
            background: linear-gradient(115deg, #2a241e, #1f1b16);
            border-radius: 48px;
            padding: 1.6rem;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.6), 0 8px 18px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .mood-badge {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 2px dashed #ffa559;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .stress-meter {
            background: #1a1612;
            border-radius: 60px;
            padding: 5px 12px;
            font-weight: bold;
            font-size: 1.3rem;
            color: #ffb347;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .funny-quote {
            font-size: 1.7rem;
            font-weight: 800;
            background: #00000055;
            padding: 12px 18px;
            border-radius: 40px;
            margin: 12px 0;
            text-align: center;
            word-break: break-word;
            color: #ffe5b4;
            line-height: 1.3;
        }

        .extra-troll {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            font-size: 1rem;
            background: #00000044;
            border-radius: 50px;
            padding: 8px 15px;
            color: #ffd966;
        }

        .extra-troll span {
            font-weight: bold;
        }

        .blink {
            animation: blinkAnim 0.9s infinite;
        }

        @keyframes blinkAnim {
            0% { opacity: 1; text-shadow: 0 0 2px red; }
            50% { opacity: 0.7; text-shadow: 0 0 8px orange; }
            100% { opacity: 1; text-shadow: 0 0 2px red; }
        }

        .shake {
            animation: shakeAnim 0.4s ease-in-out 0s 1;
        }

        @keyframes shakeAnim {
            0% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
            100% { transform: translateX(0); }
        }

        footer {
            background: #eadbba;
            text-align: center;
            padding: 12px;
            font-size: 0.7rem;
            font-weight: bold;
            color: #553b1f;
        }

        @media (max-width: 500px) {
            .content {
                padding: 1.5rem;
            }
            .funny-quote {
                font-size: 1.3rem;
            }
            .troll-header h1 {
                font-size: 1.7rem;
            }
        }

        .input-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .input-row .input-group {
            flex: 1;
        }
    </style>
</head>
<body>

<div class="detector-card" id="appRoot">
    <div class="troll-header">
        <h1>
            📉 EXAM MOOD DETECTOR 🤯
            <span>😂</span>
        </h1>
        <p>⚡ 100% accurate nonsense | troll edition ⚡</p>
    </div>

    <div class="content">
        <div class="input-row">
            <div class="input-group">
                <label>📅 Exam Date <span style="font-size:0.7rem;">(relative vibe)</span></label>
                <select id="examProximity">
                    <option value="far">🌸 Far future (>2 weeks)</option>
                    <option value="week">😬 In 1 week</option>
                    <option value="days" selected>🔥 2-3 days left (PANIC)</option>
                    <option value="tomorrow">💀 TOMORROW!!</option>
                    <option value="today">🆘 TODAY in few hours</option>
                </select>
            </div>
            <div class="input-group">
                <label>📚 Study hours (last 24h)</label>
                <input type="number" id="studyHours" value="2" step="0.5" min="0" max="24" placeholder="0 - 24 hrs">
            </div>
        </div>

        <div class="input-group">
            <label>📖 Subject (optional troll spice)</label>
            <input type="text" id="subjectInput" placeholder="e.g., Calculus, AI, Chemistry, Life..." value="Data Structures">
        </div>

        <button class="troll-btn" id="detectMoodBtn">
            🧠 CHECK MY MOOD 🤪 <span>⚡</span>
        </button>

        <div id="resultPanel" class="result-area">
            <div class="mood-badge">
                <div class="stress-meter">
                    😩 STRESS INDEX: <span id="stressPercent">0%</span>
                </div>
                <div style="font-size:1.6rem;" id="emojiOverload">😶‍🌫️</div>
            </div>
            <div class="funny-quote" id="funnyMessage">
                😴 Enter exam details & click button 😴
            </div>
            <div class="extra-troll">
                <span>💤 SLEEP STATUS:</span>
                <span id="sleepStatus">🌀 Unknown</span>
                <span>📖 PREP LOAD:</span>
                <span id="prepLoad">⚡ 0%</span>
            </div>
            <div class="extra-troll" style="margin-top: 8px;">
                <span>🎯 RESULT PREDICTION:</span>
                <span id="resultPrediction">🙏 Pray first</span>
            </div>
        </div>
    </div>
    <footer>
        🤣 Warning: this detector is sarcastic & for fun. No actual brain scanning involved.
    </footer>
</div>

<script>
    (function(){
        const proximitySelect = document.getElementById('examProximity');
        const studyHoursInput = document.getElementById('studyHours');
        const subjectInput = document.getElementById('subjectInput');
        const detectBtn = document.getElementById('detectMoodBtn');
        
        const stressSpan = document.getElementById('stressPercent');
        const emojiOverloadSpan = document.getElementById('emojiOverload');
        const funnyMsgSpan = document.getElementById('funnyMessage');
        const sleepStatusSpan = document.getElementById('sleepStatus');
        const prepLoadSpan = document.getElementById('prepLoad');
        const resultPredictionSpan = document.getElementById('resultPrediction');
        
        function calculateTrollMetrics(proximityVal, studyHours, subject) {
            let rawStudy = parseFloat(studyHours);
            if(isNaN(rawStudy)) rawStudy = 0;
            rawStudy = Math.min(24, Math.max(0, rawStudy));
            
            let proximityFactor = 0;
            let proximityText = "";
            switch(proximityVal) {
                case 'far': proximityFactor = 15; proximityText = "far away"; break;
                case 'week': proximityFactor = 45; proximityText = "1 week left"; break;
                case 'days': proximityFactor = 78; proximityText = "2-3 days left"; break;
                case 'tomorrow': proximityFactor = 94; proximityText = "TOMORROW!!"; break;
                case 'today': proximityFactor = 99; proximityText = "TODAY (few hours)"; break;
                default: proximityFactor = 70;
            }
            
            let studyBonus = 0;
            if(rawStudy === 0) studyBonus = 28;
            else if(rawStudy < 2) studyBonus = 20;
            else if(rawStudy < 5) studyBonus = 5;
            else if(rawStudy < 8) studyBonus = -8;
            else if(rawStudy < 12) studyBonus = -18;
            else studyBonus = -28;
            
            let stressRaw = proximityFactor + studyBonus;
            let stressFinal = Math.min(99, Math.max(5, Math.floor(stressRaw)));
            let subjLower = subject.toLowerCase();
            if(subjLower.includes("calculus") || subjLower.includes("math") || subjLower.includes("physics")) stressFinal = Math.min(99, stressFinal + 12);
            if(subjLower.includes("ai") || subjLower.includes("machine learning")) stressFinal = Math.min(99, stressFinal + 8);
            if(subjLower.includes("art") || subjLower.includes("history")) stressFinal = Math.max(5, stressFinal - 10);
            
            let mainEmoji = "";
            if(stressFinal >= 90) mainEmoji = "💀☠️😱";
            else if(stressFinal >= 75) mainEmoji = "🤯🔥😰";
            else if(stressFinal >= 55) mainEmoji = "😬😓🥴";
            else if(stressFinal >= 30) mainEmoji = "😐📘😴";
            else mainEmoji = "😎🍃🧘";
            
            let sleepStatusText = "";
            if(rawStudy >= 10 && proximityVal !== 'far') sleepStatusText = "💀 Sleep? What's that? (0 hrs)";
            else if(rawStudy >= 6 && (proximityVal === 'tomorrow' || proximityVal === 'today')) sleepStatusText = "😵 Micro-naps only, 2 hrs max";
            else if(proximityVal === 'today' && rawStudy < 3) sleepStatusText = "😴 Slept 30 mins (nightmare mode)";
            else if(rawStudy === 0 && proximityVal !== 'far') sleepStatusText = "🛌 You slept like a baby? But exam though 💀";
            else if(proximityVal === 'far' && rawStudy < 1) sleepStatusText = "😴 Sleep: 10 hours, but no studying";
            else if(rawStudy > 9) sleepStatusText = "⚡ Zombie mode: 4hr sleep + caffeine";
            else sleepStatusText = "💤 Sleep status: Missing (estimated 3-5 hrs)";
            if(proximityVal === 'today') sleepStatusText = "🚨 SLEEP: NON-EXISTENT (panic studying)";
            
            let prepLoadText = "";
            let prepPercent = 0;
            if(rawStudy === 0) prepPercent = 2;
            else if(rawStudy < 2) prepPercent = 8;
            else if(rawStudy < 5) prepPercent = 28;
            else if(rawStudy < 8) prepPercent = 52;
            else if(rawStudy < 12) prepPercent = 70;
            else prepPercent = 88;
            
            if(proximityVal === 'tomorrow' && rawStudy > 10) prepPercent = Math.min(95, prepPercent + 5);
            if(proximityVal === 'today') prepPercent = Math.min(85, prepPercent - 10);
            if(proximityVal === 'far' && rawStudy < 2) prepPercent = 5;
            
            prepLoadText = `📚 ${prepPercent}% loaded (${rawStudy} hours studied)`;
            if(prepPercent <= 10) prepLoadText = "🍕 Preparation: 2% ... loading... please wait ⏳";
            else if(prepPercent <= 25) prepLoadText = "📖 Prep status: 'syllabus who?' – 22%";
            else if(prepPercent <= 50) prepLoadText = `⚡ Half-baked knowledge: ${prepPercent}%`;
            else if(prepPercent <= 75) prepLoadText = `😤 Some chapters done: ${prepPercent}% – but exam anxiety high`;
            else prepLoadText = `🧠 Brain capacity at ${prepPercent}% – last minute clutch possible!`;
            
   
            let funnyQuote = "";
            const funnyPool = [
                `"Last minute study mode activated ⚡" – ${subject || "unknown subject"} exam`,
                `🧠 Brain: buffering... please wait ⏳ (studied ${rawStudy} hrs)`,
                `😭 "My notes are in another dimension" – stress level ${stressFinal}%`,
                `📉 Result prediction: Pray 🙏 + sacrifice energy drink`,
                `🤪 Professor: "Good luck"  ->  you: *chuckles I'm in danger*`,
                `📚 Syllabus coverage: 1 page per hour 💀`,
                `😂 Exam mood: 'I'll just write my name beautifully'`,
                `🕯️ Cramming level: Legendary (panic + ${rawStudy} hours)`,
                `🚀 "If I study 20hrs now, maybe I'll remember my name"`,
                `😶‍🌫️ Current strategy: Manifesting A+ without studying`
            ];
            
            if(stressFinal >= 90) {
                funnyQuote = `🔥 ${subject} exam TOMORROW?! STRESS ${stressFinal}% 🔥 "Running on fumes and desperation"`;
            } else if(stressFinal >= 75) {
                funnyQuote = `😱 Your brain: "Error 404: Knowledge not found" – studied only ${rawStudy} hrs 😱`;
            } else if(stressFinal >= 55) {
                funnyQuote = `😬 Exam vibes: "If I stare at book long enough, it might enter by osmosis" 😬 (Stress: ${stressFinal}%)`;
            } else if(stressFinal <= 25 && proximityVal !== 'today') {
                funnyQuote = `🍹 Too chill? Exam in ${proximityText}. Stress low: ${stressFinal}% – but life is good? 🤨`;
            } else {
                let randomIdx = Math.floor(Math.random() * funnyPool.length);
                funnyQuote = funnyPool[randomIdx] + ` (stress ${stressFinal}%)`;
            }
            
            let prediction = "";
            if(stressFinal > 85) prediction = "💀 Prediction: 'Will write 'crying emoji' as answer' 🙏";
            else if(stressFinal > 65) prediction = "😬 Result: 'Might pass if exam paper catches fire' ✨";
            else if(stressFinal > 40) prediction = "🤞 Prediction: 'Pass with grace & extra prayer' 🕯️";
            else if(stressFinal > 15) prediction = "😎 Prediction: 'Decent score – but why didn't you study more?'";
            else prediction = "🏆 Prediction: 'Easy A+ , but watch out for overconfidence 😂'";
            
            if(subjLower.includes("math")) prediction = "📐 Prediction: 'Hope calculator works in brain. Good luck! 🧮'";
            if(subjLower.includes("programming") || subjLower.includes("code")) prediction = "💻 Prediction: 'Runtime error in real life, but maybe debug during exam'";
            
            return {
                stress: stressFinal,
                emoji: mainEmoji,
                funnyMsg: funnyQuote,
                sleepMsg: sleepStatusText,
                prepDisplay: prepLoadText,
                predictionMsg: prediction
            };
        }
        
        function updateMood() {
            let proximity = proximitySelect.value;
            let studyHrsRaw = studyHoursInput.value;
            let subjectRaw = subjectInput.value.trim();
            if(subjectRaw === "") subjectRaw = "Unknown Subject";
            
            const metrics = calculateTrollMetrics(proximity, studyHrsRaw, subjectRaw);
            
            stressSpan.innerText = metrics.stress + "%";
            emojiOverloadSpan.innerText = metrics.emoji;
            funnyMsgSpan.innerHTML = metrics.funnyMsg;
            sleepStatusSpan.innerHTML = metrics.sleepMsg;
            prepLoadSpan.innerHTML = metrics.prepDisplay;
            resultPredictionSpan.innerHTML = metrics.predictionMsg;
            
            const panel = document.getElementById('resultPanel');
            panel.classList.add('shake');
            setTimeout(() => {
                panel.classList.remove('shake');
            }, 500);
            
            if(metrics.stress >= 80) {
                stressSpan.classList.add('blink');
                setTimeout(() => {
                    stressSpan.classList.remove('blink');
                }, 1800);
            } else {
                stressSpan.classList.remove('blink');
            }
            
            detectBtn.style.transform = "scale(0.98)";
            setTimeout(() => {
                detectBtn.style.transform = "";
            }, 150);
            
            console.log(`%c🧠 Exam mood: ${metrics.stress}% stress | ${metrics.funnyMsg}`, "color: #ff9933; font-size: 14px");
        }
        
        detectBtn.addEventListener('click', (e) => {
            e.preventDefault();
            updateMood();
        });
        
        const inputs = [studyHoursInput, subjectInput, proximitySelect];
        inputs.forEach(input => {
            input.addEventListener('keypress', (e) => {
                if(e.key === 'Enter') {
                    e.preventDefault();
                    updateMood();
                }
            });
        });
        
        updateMood();
     
        const randomFunnyEdge = () => {
            const funnyQuotes = [
                "🤣 Did you study? no? perfect for this detector",
                "📢 Warning: this app roasts your prep level 🔥",
                "💪 'Exam mood: Professional last-minute warrior'"
            ];
            let idx = Math.floor(Math.random() * funnyQuotes.length);
            funnyMsgSpan.setAttribute("data-hover", funnyQuotes[idx]);
        };
        setInterval(randomFunnyEdge, 8000);
    })();
</script>
</body>
</html>
